<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <script src="app.js" defer></script>
  <style>
    :root {
      --accent: #6366f1;
      --bg: #0f172a;
    }

    body {
      background-color: var(--bg);
      background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 20px;
      color: #f8fafc;
    }

    .container {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 32px;
      padding: 30px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-weight: 800;
      font-size: 22px;
      text-align: center;
      margin-bottom: 25px;
      letter-spacing: -1px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      opacity: 0.6;
      display: block;
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="file"] {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 10px;
      color: white;
      box-sizing: border-box;
      outline: none;
      font-size: 13px;
    }

    .control-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 15px;
    }

    .control-item {
      background: rgba(255, 255, 255, 0.02);
      padding: 10px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    input[type="color"] {
      width: 100%;
      height: 30px;
      border: none;
      background: none;
      cursor: pointer;
    }

    input[type="range"] {
      width: 100%;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .qr-preview-wrapper {
      display: flex;
      justify-content: center;
      margin: 25px 0;
    }

    .qr-preview {
      background: white;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    #photo {
      max-width: 100%;
      height: auto;
      display: block;
      transition: all 0.3s ease;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.2s;
      color: white;
      font-size: 14px;
    }

    #gen-btn {
      background: var(--accent);
      grid-column: span 2;
      margin-bottom: 5px;
    }

    #save-btn {
      background: #10b981;
    }

    #reset-btn {
      background: #ef4444;
    }

    footer {
      margin-top: 25px;
      font-size: 10px;
      opacity: 0.5;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>QR STUDIO</h1>
    <div class="form-group">
      <label>Content</label>
      <input type="text" id="content" placeholder="Enter text or URL">
    </div>
    <div class="form-group">
      <label>Logo Upload</label>
      <input type="file" id="logo-file" accept="image/*">
    </div>
    <div class="control-grid">
      <div class="control-item">
        <label>QR Color</label>
        <input type="color" id="fg-color" value="#000000">
      </div>
      <div class="control-item">
        <label>BG Color</label>
        <input type="color" id="bg-color" value="#ffffff">
      </div>
      <div class="control-item">
        <label>Margin: <span id="m-val">2</span></label>
        <input type="range" id="margin" min="0" max="10" value="2">
      </div>
      <div class="control-item">
        <label>Radius: <span id="r-val">20</span>px</label>
        <input type="range" id="radius" min="0" max="100" value="20">
      </div>
      <div class="control-item" style="grid-column: span 2;">
        <label>Resolution: <span id="s-val">300</span>px</label>
        <input type="range" id="size-input" min="100" max="1000" step="50" value="300">
      </div>
    </div>
    <div class="qr-preview-wrapper">
      <div class="qr-preview" id="qr-box">
        <img id="photo" src="https://quickchart.io/qr?text=Hello&size=300" alt="QR">
      </div>
    </div>
    <div class="actions">
      <button class="btn" id="gen-btn"><i class="fa-solid fa-wand-magic-sparkles"></i> Generate</button>
      <button class="btn" id="save-btn"><i class="fa-solid fa-download"></i> Save PNG</button>
      <button class="btn" id="reset-btn"><i class="fa-solid fa-rotate-right"></i> Reset</button>
    </div>
  </div>
  <footer>CREATED BY BROWNSLEY • SINCE 2022</footer>
</body>

</html>
